services:
  - type: web
    name: hangman-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python populate_db.py
    startCommand: gunicorn server:app
    plan: starter
    envVars:
      - key: DB_PATH
        value: /data/hangman.db
    disk:
      name: hangman-storage
      mountPath: /data
      sizeGB: 1
